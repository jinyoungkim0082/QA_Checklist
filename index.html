function buildReportHTML() {
  if (Object.keys(itemState).length === 0) return null;

  var appTitle   = document.getElementById('outputTitle').textContent || 'QA Checklist';
  var department = getVal('department');
  var tester     = getVal('tester');
  var now        = new Date().toLocaleString('ko-KR');
  var PRI_ORDER  = { high: 0, medium: 1, low: 2 };

  function donutSVG(pass, fail, na, nt, size, labelLines) {
    var total   = pass + fail + na + nt;
    var colors  = ['#008a44','#cc1133','#888888','#b07000'];
    var values  = [pass, fail, na, nt];
    var cx = size/2, cy = size/2, r = size*0.38, sw = size*0.18;
    var circ = 2*Math.PI*r;
    var paths = '';
    var offset = 0;

    if (total === 0) {
      paths = '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#e0e0e0" stroke-width="'+sw+'"/>';
    } else {
      values.forEach(function(v, idx) {
        if (v === 0) return;
        var frac = v/total;
        var dash = frac*circ, gap = circ-dash;
        var rot  = offset*360 - 90;
        paths += '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+colors[idx]+'" stroke-width="'+sw+'" stroke-dasharray="'+dash.toFixed(2)+' '+gap.toFixed(2)+'" transform="rotate('+rot.toFixed(2)+','+cx+','+cy+')" stroke-linecap="butt"/>';
        offset += frac;
      });
    }

    var labelSVG = '';
    if (labelLines.length === 1) {
      labelSVG = '<text x="'+cx+'" y="'+(cy+size*0.055)+'" text-anchor="middle" font-size="'+(size*0.16)+'" font-weight="700" fill="#111">'+labelLines[0]+'</text>';
    } else {
      var lh = size*0.14, sy = cy-(labelLines.length-1)*lh/2;
      labelLines.forEach(function(ln, li) {
        var isFirst = li === 0;
        labelSVG += '<text x="'+cx+'" y="'+(sy+li*lh+size*0.04)+'" text-anchor="middle" font-size="'+(isFirst?size*0.17:size*0.11)+'" font-weight="'+(isFirst?'700':'400')+'" fill="'+(isFirst?'#111':'#666')+'">'+ln+'</text>';
      });
    }

    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#f0f0f0" stroke-width="'+sw+'"/>'+paths+labelSVG+'</svg>';
  }

  var sectionData = [];
  document.querySelectorAll('#checklistContainer .section').forEach(function(sec) {
    var headerName = (sec.querySelector('.section-name') || {}).textContent || '';
    var headerIcon = (sec.querySelector('.section-icon') || {}).textContent || '';
    var allItems = [];

    sec.querySelectorAll('.check-item').forEach(function(item) {
      var txtEl  = item.querySelector('.item-text');
      var priEl  = item.querySelector('.item-priority');
      var selEl  = item.querySelector('.status-select');
      var rmkEl  = item.querySelector('.remark-input');
      var pc     = (priEl && priEl.className.indexOf('high') > -1) ? 'high' : (priEl && priEl.className.indexOf('medium') > -1) ? 'medium' : 'low';
      allItems.push({
        text:     txtEl ? txtEl.textContent.trim() : '',
        priClass: pc,
        priority: priEl ? priEl.textContent.trim() : '',
        status:   selEl ? selEl.value : 'none',
        remark:   rmkEl ? rmkEl.value.trim() : ''
      });
    });

    var pass = allItems.filter(function(r){return r.status==='pass';}).length;
    var fail = allItems.filter(function(r){return r.status==='fail';}).length;
    var na   = allItems.filter(function(r){return r.status==='na';}).length;
    var nt   = allItems.filter(function(r){return r.status==='nt';}).length;

    var failItems = allItems.filter(function(r){return r.status==='fail';}).sort(function(a,b){
      return (PRI_ORDER[a.priClass]||3) - (PRI_ORDER[b.priClass]||3);
    });

    sectionData.push({ headerName:headerName, headerIcon:headerIcon, total:allItems.length, pass:pass, fail:fail, na:na, nt:nt, failItems:failItems });
  });

  var totalAll = sectionData.reduce(function(s,d){return s+d.total;},0);
  var passAll  = sectionData.reduce(function(s,d){return s+d.pass;},0);
  var failAll  = sectionData.reduce(function(s,d){return s+d.fail;},0);
  var naAll    = sectionData.reduce(function(s,d){return s+d.na;},0);
  var ntAll    = sectionData.reduce(function(s,d){return s+d.nt;},0);
  var doneAll  = passAll+failAll+naAll+ntAll;

  var overallDonut = donutSVG(passAll,failAll,naAll,ntAll,110,[doneAll+'/'+totalAll,'전체 진행률']);

  var catDonutsHTML = '';
  sectionData.forEach(function(d) {
    var svg = donutSVG(d.pass,d.fail,d.na,d.nt,76,[(d.pass+d.fail+d.na+d.nt)+'/'+d.total]);
    catDonutsHTML += '<div class="cat-donut-cell">'+svg+'<div class="cat-donut-name">'+d.headerIcon+' '+d.headerName.replace(/\(.*\)/,'').trim()+'</div><div class="cat-donut-chips">'+(d.pass?'<span class="dc pass">P '+d.pass+'</span>':'')+(d.fail?'<span class="dc fail">F '+d.fail+'</span>':'')+(d.na?'<span class="dc na">N/A '+d.na+'</span>':'')+(d.nt?'<span class="dc nt">N/T '+d.nt+'</span>':'')+((d.pass+d.fail+d.na+d.nt)===0?'<span class="dc none">미진행</span>':'')+'</div></div>';
  });

  var sectionsHTML = '';
  sectionData.forEach(function(d) {
    var rowsHTML = '';
    if (d.failItems.length === 0) {
      rowsHTML = '<tr><td colspan="4" class="no-fail">✅ FAIL 항목 없음</td></tr>';
    } else {
      d.failItems.forEach(function(item) {
        rowsHTML += '<tr><td class="cell-text">'+escHtml(item.text)+'</td><td class="cell-pri pri-'+item.priClass+'">'+escHtml(item.priority)+'</td><td class="cell-status status-fail">FAIL</td><td class="cell-remark">'+escHtml(item.remark)+'</td></tr>';
      });
    }
    var bc = d.fail > 0 ? '#cc1133' : '#008a44';
    sectionsHTML += '<div class="p-section"><div class="p-section-header" style="border-left-color:'+bc+'"><span class="p-icon">'+d.headerIcon+'</span><span class="p-name">'+escHtml(d.headerName)+'</span><span class="p-stats">전체 '+d.total+' &nbsp;|&nbsp; <span style="color:#008a44">P '+d.pass+'</span> &nbsp;<span style="color:#cc1133">F '+d.fail+'</span> &nbsp;<span style="color:#777">N/A '+d.na+'</span> &nbsp;<span style="color:#b07000">N/T '+d.nt+'</span></span></div><table><thead><tr><th style="width:56%">FAIL 항목 (중요도 순)</th><th style="width:10%">우선순위</th><th style="width:8%">결과</th><th style="width:26%">비고</th></tr></thead><tbody>'+rowsHTML+'</tbody></table></div>';
  });

  var metaExtra = [department && '부서: '+department, tester && '진행자: '+tester].filter(Boolean).join(' &nbsp;|&nbsp; ');

  var printDoc = '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QA Report</title><style>@page{size:A4 portrait;margin:20mm}*{box-sizing:border-box;margin:0;padding:0}html{font-size:13px}body{font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif;font-size:10pt;line-height:1.5;color:#111;background:#fff;width:170mm;margin:0 auto;padding:10mm 0}.print-btn{display:block;width:100%;margin:0 auto 8mm;padding:9pt 0;background:#111;color:#fff;border:none;font-size:10pt;font-weight:700;cursor:pointer;letter-spacing:1px;text-align:center}.print-btn:hover{background:#333}.report-header{display:flex;align-items:flex-start;gap:6mm;margin-bottom:6mm;padding-bottom:5mm;border-bottom:2px solid #111}.report-title-block{flex:1}h1{font-size:16pt;font-weight:900;margin-bottom:2mm}.meta{font-size:8pt;color:#888;margin-bottom:3mm}.overall-donut{flex-shrink:0;text-align:center}.overall-donut-label{font-size:7.5pt;color:#666;margin-top:2mm;font-weight:700;text-transform:uppercase}.overall-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:3mm}.o-chip{font-size:8pt;padding:2px 8px;border:1px solid;font-weight:700}.o-total{color:#333;border-color:#999}.o-pass{color:#008a44;border-color:#008a44}.o-fail{color:#cc1133;border-color:#cc1133}.o-na{color:#777;border-color:#aaa}.o-nt{color:#b07000;border-color:#b07000}.donut-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:5mm;align-items:center}.legend-item{display:flex;align-items:center;gap:4px;font-size:7.5pt;color:#555}.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}.cat-donuts-wrap{margin-bottom:6mm}.section-label{font-size:8pt;font-weight:700;color:#444;letter-spacing:2px;text-transform:uppercase;margin-bottom:3mm;padding-bottom:2mm;border-bottom:1px solid #ddd}.cat-donuts-grid{display:flex;flex-wrap:wrap;gap:4mm}.cat-donut-cell{display:flex;flex-direction:column;align-items:center;width:28mm}.cat-donut-name{font-size:7pt;color:#333;text-align:center;margin-top:2mm;line-height:1.3;font-weight:600;word-break:keep-all}.cat-donut-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-top:2mm}.dc{font-size:6.5pt;padding:1px 4px;border:1px solid;font-weight:700}.dc.pass{color:#008a44;border-color:#008a44}.dc.fail{color:#cc1133;border-color:#cc1133}.dc.na{color:#777;border-color:#aaa}.dc.nt{color:#b07000;border-color:#b07000}.dc.none{color:#aaa;border-color:#ddd}.p-section{margin-bottom:5mm;page-break-inside:avoid}.p-section-header{display:flex;align-items:center;gap:6px;background:#f5f5f5;padding:3mm 4mm;border-left:3px solid #333}.p-icon{font-size:10pt}.p-name{font-weight:700;font-size:9.5pt;flex:1}.p-stats{font-size:7.5pt;color:#555;white-space:nowrap}table{width:100%;border-collapse:collapse}th{background:#222;color:#fff;font-size:8pt;font-weight:600;padding:3mm 4mm;text-align:left}td{padding:2.5mm 4mm;font-size:9pt;border-bottom:1px solid #efefef;vertical-align:top;line-height:1.45}tr td{background:#fff8f8}.cell-pri{font-size:7.5pt;font-weight:700;white-space:nowrap}.pri-high{color:#cc1133}.pri-medium{color:#b07000}.pri-low{color:#888}.cell-status{font-weight:700;font-size:8.5pt;text-align:center;white-space:nowrap;color:#cc1133}.cell-remark{font-size:8pt;color:#555;font-style:italic}.no-fail td{background:#f5fff8;color:#008a44;font-size:8.5pt;text-align:center;padding:3mm}@media print{html{font-size:12px}body{width:auto;margin:0;padding:0}.no-print{display:none!important}.p-section{page-break-inside:avoid}.cat-donuts-wrap{page-break-inside:avoid}}</style></head><body>'
    + '<button class="print-btn no-print" onclick="window.print()">🖨️ 인쇄 / PDF 저장</button>'
    + '<div class="report-header"><div class="report-title-block"><h1>📋 '+escHtml(appTitle)+'</h1><div class="meta">생성일시: '+now+(metaExtra?' &nbsp;|&nbsp; '+metaExtra:'')+'</div><div class="overall-chips"><span class="o-chip o-total">전체 '+totalAll+'개</span><span class="o-chip o-total">진행 '+doneAll+'/'+totalAll+'</span><span class="o-chip o-pass">PASS '+passAll+'</span><span class="o-chip o-fail">FAIL '+failAll+'</span><span class="o-chip o-na">N/A '+naAll+'</span><span class="o-chip o-nt">N/T '+ntAll+'</span></div></div><div class="overall-donut">'+overallDonut+'<div class="overall-donut-label">전체 결과</div></div></div>'
    + '<div class="donut-legend"><span style="font-size:8pt;color:#888;font-weight:600;letter-spacing:1px;">범례</span><span class="legend-item"><span class="legend-dot" style="background:#008a44"></span>PASS</span><span class="legend-item"><span class="legend-dot" style="background:#cc1133"></span>FAIL</span><span class="legend-item"><span class="legend-dot" style="background:#888888"></span>N/A</span><span class="legend-item"><span class="legend-dot" style="background:#b07000"></span>N/T</span></div>'
    + '<div class="cat-donuts-wrap"><div class="section-label">카테고리별 결과 현황</div><div class="cat-donuts-grid">'+catDonutsHTML+'</div></div>'
    + '<div class="section-label" style="margin-bottom:4mm;">FAIL 항목 상세 (카테고리별 · 중요도 순)</div>'
    + sectionsHTML
    + '<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},500);};<'+'/scr'+'ipt></body></html>';

  return printDoc;
}

function printChecklist() {
  var printDoc = buildReportHTML();
  if (!printDoc) { showSaveStatus('출력할 체크리스트가 없습니다.', 'err'); return; }

  var win = window.open('', '_blank');
  if (win) {
    win.document.open();
    win.document.write(printDoc);
    win.document.close();
  } else {
    var blob = new Blob([printDoc], { type: 'text/html;charset=utf-8' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'QA-Checklist.html';
    a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 5000);
  }

}
